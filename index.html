function toast(msg, tipo = "ok") {
  const col = { ok: "bg-green-600", error: "bg-red-600", info: "bg-violet-700", warning: "bg-amber-600" };
  const el = document.createElement("div");
  el.className = `${col[tipo] || col.info} text-white px-4 py-3 rounded-lg shadow-lg text-sm max-w-sm`;
  el.textContent = msg;

function showModal(html) { $("modal-content").innerHTML = html; $("modal").classList.remove("hidden"); }

function confirmar(mensaje, onOk) {

/* ══════════════ API (Apps Script) ══════════════ */
// text/plain evita el preflight CORS (patrón probado con GarantApp)
async function api(action, payload) {
  const r = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action, token: TOKEN, payload: payload || {} }),
  });
  const data = await r.json();
  if (data.auth) { logout(); throw new Error(data.error); }
  if (data.error) throw new Error(data.error);
  return data.data;
}

function badge(txt, tipo) {
  return `<span class="badge-${tipo} px-2 py-0.5 rounded-full text-xs font-medium">${esc(txt)}</span>`;
}
const resultadoBadge = (r) => badge(r, { ok: "ok", error: "error", warning: "warning",
  "con errores": "warning", "falló": "error" }[r] || "info");
const spinner = (t = "Cargando...") => `<div class="flex items-center gap-3 text-gray-500 p-8">
  <div class="spin w-5 h-5 border-2 border-violet-700 border-t-transparent rounded-full"></div>${esc(t)}</div>`;

/* ══════════════ Parseo de archivos ══════════════ */
// Replica el manejo de encabezados duplicados de pandas: Ciudad, Ciudad.1, ...
function dedupHeaders(headers) {
  const seen = {};
  return headers.map((h) => {
    h = String(h ?? "").trim();
    if (!(h in seen)) { seen[h] = 0; return h; }
    seen[h] += 1;
    return `${h}.${seen[h]}`;
  });
}

// Parser CSV propio (respeta comillas, comas internas y saltos escapados).
// Los CSV de Frávega tienen columnas repetidas y comas dentro de valores, así
// que NO usamos SheetJS para CSV (parsea mal ese caso). SheetJS solo para Excel.
function parseCSVText(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // quitar BOM
  const rows = [];
  let row = [], field = "", i = 0, inQ = false;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
        inQ = false; i++; continue;
      }
      field += c; i++; continue;
    }
    if (c === '"') { inQ = true; i++; continue; }
    if (c === ',') { row.push(field); field = ""; i++; continue; }
    if (c === '\r') { i++; continue; }
    if (c === '\n') { row.push(field); rows.push(row); row = []; field = ""; i++; continue; }
    field += c; i++;
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function rowsToObjects(raw) {
  if (!raw.length) return [];
  const headers = dedupHeaders(raw[0]);
  return raw.slice(1)
    .filter((r) => r.some((c) => c !== "" && c !== null && c !== undefined))
    .map((r) => {
      const o = {};
      headers.forEach((h, i) => { o[h] = r[i] ?? ""; });
      return o;
    });
}

function parseFile(file) {
  const esCSV = /\.csv$/i.test(file.name || "");
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
    reader.onload = (e) => {
      try {
        if (esCSV) {
          resolve(rowsToObjects(parseCSVText(e.target.result)));
        } else {
          const wb = XLSX.read(e.target.result, { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const raw = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: "" });
          resolve(rowsToObjects(raw));
        }
      } catch (err) { reject(err); }
    };
    if (esCSV) reader.readAsText(file, "utf-8");
    else reader.readAsArrayBuffer(file);
  });
}

/* ══════════════ Login ══════════════ */
function initAuth() {
  if (API_URL.indexOf("PEGAR_ACA") === 0) {
    document.body.innerHTML = '<div class="p-10 text-center text-red-600 font-bold">' +
      'Falta configurar API_URL en index.html (la URL /exec del Apps Script).</div>';
    return;
  }
  if (TOKEN && USER) return showApp();
  showLogin();
}

function showLogin() {
  $("app-screen").classList.add("hidden");
  $("login-screen").classList.remove("hidden");
  const render = () => {
    if (!window.google || !google.accounts) return setTimeout(render, 200);
    google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onGoogle });
    google.accounts.id.renderButton($("google-btn"),
      { theme: "filled_blue", size: "large", text: "signin_with", width: 280 });
  };
  render();
}

async function onGoogle(resp) {
  try {
    const r = await fetch(API_URL, {
      method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "login", credential: resp.credential }),
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    TOKEN = data.token;
    USER = { email: data.email, name: data.name };
    localStorage.setItem("tf_token", TOKEN);
    localStorage.setItem("tf_user", JSON.stringify(USER));
    showApp();
  } catch (e) {
    $("login-error").textContent = e.message;
    $("login-error").classList.remove("hidden");
  }
}

function logout() {
  localStorage.removeItem("tf_token"); localStorage.removeItem("tf_user");
  TOKEN = ""; USER = null; location.hash = ""; location.reload();
}

/* ══════════════ Shell ══════════════ */
function showApp() {
  $("login-screen").classList.add("hidden");
  $("app-screen").classList.remove("hidden");
  $("user-name").textContent = USER.name || "";
  $("user-email").textContent = USER.email || "";
  $("nav").innerHTML = VIEWS.map((v) =>
    `<a href="#${v.id}" data-view="${v.id}"
        class="nav-item block px-3 py-2 rounded-lg hover:bg-violet-900">${v.label}</a>`).join("");
  window.addEventListener("hashchange", route);
  route();
}

function route() {
  const view = (location.hash || "#dashboard").slice(1).split("?")[0];
  document.querySelectorAll(".nav-item").forEach((el) =>
    el.classList.toggle("active", el.dataset.view === view));
  ({ dashboard: viewDashboard, stock: viewStock, ordenes: viewOrdenes,
     facturas: viewFacturas, skus: viewSkus, pendientes: viewPendientes,
     logs: viewLogs, config: viewConfig }[view] || viewDashboard)();
}

const setMain = (h) => { $("main").innerHTML = h; };
const H = (t) => `<h2 class="text-xl font-bold mb-4">${t}</h2>`;
const card = (inner, extra = "") => `<div class="bg-white rounded-xl shadow p-5 ${extra}">${inner}</div>`;

/* ══════════════ DASHBOARD ══════════════ */
async function viewDashboard() {
  setMain(H("Dashboard") + spinner("Consultando Tango y Frávega..."));
  let d;
  try { d = await api("dashboard"); }
  catch (e) { return setMain(H("Dashboard") + card(`<p class="text-red-600">${esc(e.message)}</p>`)); }

  const estado = (s) => s.ok
    ? `<div class="text-green-600 font-bold text-lg">● Conectado</div><div class="text-xs text-gray-500">${esc(s.detalle)}</div>`
    : `<div class="text-red-600 font-bold text-lg">● Sin conexión</div><div class="text-xs text-gray-500">${esc(s.detalle)}</div>`;

  const u = d.sincronizacion.ultima;
  const ultimaTxt = u
    ? `${esc(u.inicio)} — ${resultadoBadge(u.resultado)}<div class="text-xs text-gray-500 mt-1">
       ok: ${u.ok} · errores: ${u.errores} · no publicados: ${u.no_publicados} · sin relación: ${u.sin_relacion}</div>`
    : '<span class="text-gray-400">Nunca se ejecutó</span>';

  setMain(H("Dashboard") + `
    ${d.alertas.length ? `<div class="mb-4 space-y-2">${d.alertas.map((a) =>
      `<div class="bg-amber-50 border border-amber-300 text-amber-800 px-4 py-2 rounded-lg text-sm">⚠️ ${esc(a)}</div>`).join("")}</div>` : ""}
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-4">
      ${card(`<div class="text-xs text-gray-500 uppercase mb-1">Tango</div>${estado(d.tango)}`)}
      ${card(`<div class="text-xs text-gray-500 uppercase mb-1">Frávega</div>${estado(d.fravega)}`)}
      ${card(`<div class="text-xs text-gray-500 uppercase mb-1">Última sincronización</div>${ultimaTxt}`)}
      ${card(`<div class="text-xs text-gray-500 uppercase mb-1">Próxima sincronización</div>
        <div class="font-bold text-lg">${d.sincronizacion.proxima ? esc(d.sincronizacion.proxima) : "—"}</div>
        <div class="text-xs text-gray-500">${d.sincronizacion.habilitada ? "Automática habilitada" : "Automática deshabilitada"}</div>`)}
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
      ${[["Relaciones de SKU", d.contadores.relaciones, "#skus"],
         ["SKU sin relación", d.contadores.sku_pendientes, "#pendientes"],
         ["Órdenes importadas", d.contadores.ordenes_importadas, "#ordenes"],
         ["Errores (24 hs)", d.contadores.errores_24h, "#logs"]].map(([t, n, href]) =>
        `<a href="${href}" class="bg-white rounded-xl shadow p-5 hover:shadow-md">
           <div class="text-3xl font-bold">${n}</div>
           <div class="text-xs text-gray-500 uppercase mt-1">${t}</div></a>`).join("")}
    </div>
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
      ${card(`<div class="text-xs text-gray-500 uppercase mb-2">Última exportación de facturas</div>
        ${d.ultima_exportacion
          ? `${esc(d.ultima_exportacion.fecha_hora)} — ${esc(d.ultima_exportacion.archivo)}
             <div class="text-xs text-gray-500 mt-1">cargadas: ${d.ultima_exportacion.cargadas}
             · sin factura: ${d.ultima_exportacion.sin_factura}</div>`
          : '<span class="text-gray-400">Sin exportaciones aún</span>'}`)}
      ${card(`<div class="text-xs text-gray-500 uppercase mb-2">Errores recientes</div>
        ${d.errores_recientes.length ? d.errores_recientes.map((l) =>
          `<div class="text-sm border-b border-gray-100 py-1">
             <span class="text-gray-400 text-xs">${esc(l.fecha_hora)}</span>
             [${esc(l.modulo)}] ${esc(l.accion)}: <span class="text-red-600">${esc(String(l.detalle).slice(0, 120))}</span></div>`).join("")
          : '<span class="text-gray-400">Sin errores 🎉</span>'}`)}
    </div>`);
}

/* ══════════════ STOCK ══════════════ */
async function viewStock() {
  setMain(H("Sincronización de Stock") + spinner());
  let st, hist;
  try { [st, hist] = await Promise.all([api("stock.status"), api("stock.history")]); }
  catch (e) { return setMain(H("Sincronización de Stock") + card(`<p class="text-red-600">${esc(e.message)}</p>`)); }

  const rows = hist.map((h) => `
    <tr class="cursor-pointer" onclick='verDetalleSync(${JSON.stringify(String(h.detalle_json || "[]"))})'>
      <td>${esc(h.inicio)}</td><td>${esc(h.fin || "—")}</td>
      <td>${esc(h.disparada_por)}</td><td>${resultadoBadge(h.resultado)}</td>
      <td class="text-center">${h.ok}</td><td class="text-center">${h.errores}</td>
      <td class="text-center">${h.no_publicados}</td><td class="text-center">${h.sin_relacion}</td>
    </tr>`).join("");

  setMain(H("Sincronización de Stock") + `
    <div class="flex flex-wrap items-center gap-4 mb-4">
      <button onclick="dispararSync()"
        class="bg-violet-700 hover:bg-violet-800 text-white px-5 py-2.5 rounded-lg font-medium">
        ▶️ Sincronizar ahora</button>
      <div class="text-sm text-gray-600">Próxima automática:
        <b>${st.proxima ? esc(st.proxima) : "deshabilitada"}</b></div>
      <button onclick="viewStock()" class="text-sm text-violet-700 underline">Actualizar</button>
    </div>
    ${card(`<div class="text-xs text-gray-500 uppercase mb-2">Historial (clic en una fila para ver el detalle)</div>
      <table class="data w-full"><thead><tr>
        <th>Inicio</th><th>Fin</th><th>Disparada por</th><th>Resultado</th>
        <th>OK</th><th>Errores</th><th>No public.</th><th>Sin relación</th>
      </tr></thead><tbody>${rows || '<tr><td colspan="8" class="text-gray-400 p-4">Sin sincronizaciones aún</td></tr>'}</tbody></table>`)}`);
}

function dispararSync() {
  confirmar("¿Sincronizar el stock de Tango (depósito configurado) hacia Frávega ahora? Puede tardar hasta un minuto.", async () => {
    setMain(H("Sincronización de Stock") + spinner("Sincronizando... (leyendo Tango y actualizando Frávega)"));
    try {
      const r = await api("stock.sync");
      if (r.resultado === "omitida") toast(r.mensaje, "warning");
      else toast(`Sincronización ${r.resultado}: ${r.ok} OK, ${r.errores} errores`, r.errores ? "warning" : "ok");
    } catch (e) { toast(e.message, "error"); }
    viewStock();
  });
}

function verDetalleSync(jsonStr) {
  let detalle;
  try { detalle = JSON.parse(jsonStr); } catch (_) { detalle = []; }
  if (!detalle.length) return;
  showModal(`
    <h3 class="font-bold text-lg mb-3">Detalle de la sincronización</h3>
    <table class="data w-full"><thead><tr><th>SKU</th><th>refId</th><th>Cantidad</th><th>Estado</th></tr></thead>
    <tbody>${detalle.map((d) => `<tr><td>${esc(d.sku)}</td><td>${esc(d.refId)}</td>
      <td>${d.cantidad}</td><td>${resultadoBadge(d.estado === "ok" ? "ok" : d.estado === "error" ? "error" : "warning")}
      ${d.detalle ? `<div class="text-xs text-gray-500">${esc(d.detalle)}</div>` : ""}</td></tr>`).join("")}</tbody></table>
    <div class="mt-4 text-right"><button onclick="closeModal()" class="px-4 py-2 rounded-lg border">Cerrar</button></div>`);
}

/* ══════════════ ÓRDENES ══════════════ */
let ORDENES_ROWS = null, ORDENES_ARCHIVO = "", ORDENES_ANALISIS = null, ORDENES_COMPLETAS = [];

function viewOrdenes() {
  // Pintamos la sección de carga PRIMERO y sin await, así el input de archivo
  // nunca se destruye por una llamada async que llega después.
  setMain(H("Ingreso de Órdenes") + `
    ${card(`
      <div class="text-sm text-gray-600 mb-3">Subí el <b>CSV de órdenes exportado de Frávega</b>.
        Primero se analiza (vista previa) y recién después confirmás el envío a Tango.</div>
      <div class="flex items-center gap-3 flex-wrap">
        <input type="file" id="ordenes-file" accept=".csv"
          class="text-sm file:mr-3 file:px-4 file:py-2 file:rounded-lg file:border-0 file:bg-violet-100 file:text-violet-800 file:font-medium">
        <button onclick="analizarOrdenes()" class="bg-violet-700 text-white px-4 py-2 rounded-lg">1️⃣ Analizar</button>
      </div>
      <div id="ordenes-resultado" class="mt-4"></div>`, "mb-4")}
    ${card(`<div class="text-xs text-gray-500 uppercase mb-2">Historial de importaciones</div>
      <div id="ordenes-hist">${spinner("Cargando historial...")}</div>`)}`);
  cargarHistorialOrdenes();  // llena SOLO el div del historial, sin tocar la carga
}

async function cargarHistorialOrdenes() {
  const cont = $("ordenes-hist");
  if (!cont) return;
  let hist;
  try { hist = await api("orders.history"); }
  catch (e) { cont.innerHTML = `<p class="text-red-600 text-sm">${esc(e.message)}</p>`; return; }
  if (!$("ordenes-hist")) return;  // el usuario ya cambió de pantalla: no tocar nada
  cont.innerHTML = `
    <table class="data w-full"><thead><tr>
      <th>Fecha</th><th>Usuario</th><th>Archivo</th><th>Filas</th><th>Nuevas</th><th>Enviadas</th><th>Rechazadas</th>
    </tr></thead><tbody>
    ${hist.map((h) => `<tr><td>${esc(h.fecha_hora)}</td><td>${esc(h.usuario)}</td><td>${esc(h.archivo)}</td>
      <td class="text-center">${h.total_filas}</td><td class="text-center">${h.nuevas}</td>
      <td class="text-center font-bold text-green-700">${h.enviadas}</td>
      <td class="text-center ${Number(h.rechazadas) ? "font-bold text-red-600" : ""}">${h.rechazadas}</td></tr>`).join("")
      || '<tr><td colspan="7" class="text-gray-400 p-4">Sin importaciones aún</td></tr>'}
    </tbody></table>`;
}


async function analizarOrdenes() {
  const input = $("ordenes-file");
  if (!input || !input.files.length) return toast("Elegí el archivo CSV y después apretá Analizar", "warning");
  $("ordenes-resultado").innerHTML = spinner("Leyendo y analizando el CSV...");
  try {
    ORDENES_ROWS = await parseFile(input.files[0]);
    ORDENES_ARCHIVO = input.files[0].name;

function enviarOrdenes() {
  const total = ORDENES_COMPLETAS.length;
  confirmar(`Se van a crear ${total} pedido(s) en Tango, en tandas de 40. ¿Continuar?`, async () => {
    const TANDA = 40;
    const enviadas = [], rechazadas = [];
    const box = $("ordenes-resultado");

    for (let i = 0; i < total; i += TANDA) {
      const lote = ORDENES_COMPLETAS.slice(i, i + TANDA);
      const desde = i + 1, hasta = Math.min(i + TANDA, total);
      box.innerHTML = `
        <div class="border rounded-lg p-4 bg-violet-50">
          ${spinner(`Enviando órdenes ${desde}–${hasta} de ${total}...`)}
          <div class="text-xs text-gray-500 mt-2">Aceptadas hasta ahora: ${enviadas.length}
            ${rechazadas.length ? `· rechazadas: ${rechazadas.length}` : ""}</div>
          <div class="w-full bg-violet-200 rounded-full h-2 mt-2">
            <div class="bg-violet-700 h-2 rounded-full" style="width:${Math.round(hasta / total * 100)}%"></div></div>
        </div>`;
      try {
        const r = await api("orders.sendBatch", { orders: lote, archivo: ORDENES_ARCHIVO });
        enviadas.push(...r.enviadas);
        rechazadas.push(...r.rechazadas);
      } catch (e) {
        // No cortamos todo: registramos el error de esta tanda y seguimos
        rechazadas.push({ orden: `tanda ${desde}-${hasta}`, error: e.message });
      }
    }

    box.innerHTML = `
      <div class="border rounded-lg p-4 ${rechazadas.length ? "bg-amber-50" : "bg-green-50"}">
        <div class="font-bold mb-2">✅ Enviadas y aceptadas por Tango: ${enviadas.length} de ${total}</div>
        <div class="max-h-40 overflow-y-auto">
          ${enviadas.map((id) => `<span class="inline-block bg-white border rounded px-2 py-0.5 text-xs mr-1 mb-1">${esc(id)}</span>`).join("")}
        </div>
        ${rechazadas.length ? `<div class="font-bold mt-3 mb-1 text-red-700">❌ Rechazadas / con problema: ${rechazadas.length}</div>
          <div class="max-h-40 overflow-y-auto">
          ${rechazadas.map((f) => `<div class="text-sm text-red-700">· ${esc(f.orden)}: ${esc(f.error)}</div>`).join("")}
          </div>` : ""}
      </div>`;
    toast(`${enviadas.length} órdenes enviadas a Tango`, rechazadas.length ? "warning" : "ok");
    cargarHistorialOrdenes();
  });
}

async function cargarHistorialFacturas() {
  const cont = $("fac-hist");
  if (!cont) return;
  let hist;
  try { hist = await api("invoices.history"); }
  catch (e) { cont.innerHTML = `<p class="text-red-600 text-sm">${esc(e.message)}</p>`; return; }
  if (!$("fac-hist")) return;
  cont.innerHTML = `
    <table class="data w-full"><thead><tr>

    </tr></thead><tbody>
    ${hist.map((h) => `<tr><td>${esc(h.fecha_hora)}</td><td>${esc(h.usuario)}</td>
      <td class="text-xs">${esc(h.archivo)}</td>

async function generarFacturas() {
  const fo = $("fac-ordenes"), fl = $("fac-libro");
  if (!fo.files.length || !fl.files.length) return toast("Subí los dos archivos", "warning");
  $("fac-resultado").innerHTML = spinner("Cruzando órdenes con facturas...");
  try {
    const [ordenesRows, facturasRows] = await Promise.all(
      [parseFile(fo.files[0]), parseFile(fl.files[0])]);
    const r = await api("invoices.generate", { ordenes: ordenesRows, facturas: facturasRows });
    // Descargar el xlsx desde base64
    const bytes = Uint8Array.from(atob(r.base64), (c) => c.charCodeAt(0));
    const blob = new Blob([bytes],
      { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = r.archivo;
    a.click();
    URL.revokeObjectURL(a.href);

    $("fac-resultado").innerHTML = `
      <div class="border rounded-lg p-4 bg-green-50">
        <div class="font-bold mb-2">✅ Archivo generado y descargado — ${r.cargadas} orden(es) cargada(s)</div>
        <div class="text-sm mb-2">${esc(r.archivo)}</div>
        ${r.sin_factura.length ? `<div class="text-sm text-amber-800 bg-amber-50 border border-amber-200 rounded p-2 mb-2">
          ⚠️ ${r.sin_factura.length} pendiente(s) sin factura:
          ${r.sin_factura.map((s) => `<div>· ${esc(s.orden)} — ${esc(s.cliente)}</div>`).join("")}</div>` : ""}
        ${r.sobrantes.length ? `<div class="text-sm text-amber-800 bg-amber-50 border border-amber-200 rounded p-2">
          ⚠️ ${r.sobrantes.length} factura(s) sin orden pendiente:
          ${r.sobrantes.map((s) => `<div>· ${esc(s.cliente)} — ${esc(s.factura)}</div>`).join("")}</div>` : ""}
      </div>`;
    toast("Archivo de facturas generado", "ok");
  } catch (e) {
    $("fac-resultado").innerHTML = `<p class="text-red-600 text-sm">${esc(e.message)}</p>`;
  }
}

async function guardarSku(originalSku, pendOrigen, pendSku) {
  try {
    await api("skus.save", {
      sku_tango: $("f-sku").value.trim(),
      fravega_item_id: $("f-item").value.trim(),
      fravega_refid: $("f-refid").value.trim(),
      descripcion: $("f-desc").value.trim(),
      original_sku: originalSku,
    });
    // Si venía de un pendiente, lo marcamos resuelto automáticamente
    if (pendOrigen && pendSku) {

    }
    closeModal(); toast("Relación guardada", "ok");
    (location.hash.startsWith("#pendientes") ? viewPendientes : viewSkus)();

}

    catch (e) { toast(e.message, "error"); }
  });
}

// Alias de encabezados aceptados al importar
const SKU_ALIASES = {
  sku_tango: ["sku_tango", "sku tango", "tango", "skucode", "codigo tango", "código tango"],
  fravega_item_id: ["fravega_item_id", "item_id", "sku fravega", "sku_fravega", "id publicacion", "productcode"],
  fravega_refid: ["fravega_refid", "refid", "ref_id", "reference id"],
  descripcion: ["descripcion", "descripción", "description", "detalle"],
};

async function importarSkus(input) {
  if (!input.files.length) return;
  try {
    const raw = await parseFile(input.files[0]);
    const rows = raw.map((r) => {
      const o = {};
      Object.keys(r).forEach((k) => {
        const key = k.trim().toLowerCase();
        for (const target in SKU_ALIASES) {
          if (SKU_ALIASES[target].includes(key)) o[target] = r[k];
        }
      });
      return o;
    });
    const res = await api("skus.import", { rows });
    toast(`Importación: ${res.creadas} creadas, ${res.actualizadas} actualizadas` +
          (res.errores.length ? `, ${res.errores.length} errores` : ""),
          res.errores.length ? "warning" : "ok");
    if (res.errores.length) showModal(`<h3 class="font-bold mb-3">Errores de importación</h3>
      <div class="text-sm space-y-1">${res.errores.map((e) => `<div>· ${esc(e)}</div>`).join("")}</div>
      <div class="mt-4 text-right"><button onclick="closeModal()" class="px-4 py-2 border rounded-lg">Cerrar</button></div>`);
    viewSkus();
  } catch (e) { toast(e.message, "error"); }
  input.value = "";
}

async function exportarSkus() {
  const rels = window._SKUS_CACHE || await api("skus.list", { q: "" });
  const lines = ["sku_tango,fravega_item_id,fravega_refid,descripcion"];
  rels.forEach((r) => {
    const desc = String(r.descripcion || "").replace(/"/g, "'");
    lines.push(`${r.sku_tango},${r.fravega_item_id || ""},${r.fravega_refid},"${desc}"`);
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([lines.join("\n")], { type: "text/csv" }));
  a.download = "relaciones_sku.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

      <td class="text-xs text-gray-600 max-w-md truncate" title="${esc(l.detalle)}">${esc(l.detalle)}</td>
      <td class="text-xs text-gray-400">${l.duracion_ms || ""}</td></tr>`).join("")
      || '<tr><td colspan="7" class="text-gray-400 p-4">Sin registros</td></tr>'}
    </tbody></table>
    <div class="text-xs text-gray-400 mt-2">${LOGS_CACHE.length} registro(s) —
      el historial completo está en la pestaña Logs de la Google Sheet</div>`);
}

function descargarLogs() {
  const lines = ["fecha_hora,usuario,modulo,accion,resultado,detalle,duracion_ms"];
  LOGS_CACHE.forEach((l) => {
    const det = String(l.detalle || "").replace(/"/g, "'").replace(/\n/g, " ");
    lines.push(`${l.fecha_hora},${l.usuario},${l.modulo},"${String(l.accion).replace(/"/g, "'")}",${l.resultado},"${det}",${l.duracion_ms || ""}`);
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([lines.join("\n")], { type: "text/csv" }));
  a.download = "logs.csv"; a.click();
  URL.revokeObjectURL(a.href);
}

async function viewConfig() {
  setMain(H("Configuración") + spinner());
  let cfg;
  try { cfg = await api("settings.get"); }
  catch (e) { return setMain(H("Configuración") + card(`<p class="text-red-600">${esc(e.message)}</p>`)); }
  const v = cfg.valores;

  const campo = ([key, label, tipo]) => tipo === "bool"
    ? `<label class="flex items-center gap-2 text-sm py-1">
         <input type="checkbox" data-key="${key}" ${v[key] === "1" ? "checked" : ""}
           class="cfg-input w-4 h-4"> ${label}</label>`
    : `<div class="py-1"><label class="text-xs text-gray-500 uppercase">${label}</label>
         <input data-key="${key}" value="${esc(v[key] ?? "")}"
           class="cfg-input border rounded-lg px-3 py-2 w-full text-sm"></div>`;

  const cred = (ok, nombre) => `<div class="flex items-center gap-2 text-sm py-0.5">
    ${ok ? '<span class="text-green-600">●</span>' : '<span class="text-red-600">●</span>'}
    ${nombre} ${ok ? "" : '<span class="text-red-600 text-xs">(falta en Script Properties)</span>'}</div>`;

  setMain(H("Configuración") + `
    <div class="grid xl:grid-cols-2 gap-4">
      <div class="space-y-4">
        ${CONFIG_CAMPOS.map(([titulo, campos]) => card(
          `<div class="text-xs text-gray-500 uppercase font-bold mb-2">${titulo}</div>
           ${campos.map(campo).join("")}`)).join("")}
        <button onclick="guardarConfig()"
          class="bg-violet-700 text-white px-5 py-2.5 rounded-lg font-medium">💾 Guardar cambios</button>
        <span class="text-sm text-gray-500 ml-3">Próxima sincronización:
          <b>${cfg.proxima_sincronizacion ? esc(cfg.proxima_sincronizacion) : "—"}</b></span>
      </div>
      <div>
        ${card(`<div class="text-xs text-gray-500 uppercase font-bold mb-2">Credenciales</div>
          ${cred(cfg.credenciales.tango_token, "Token de Tango")}
          ${cred(cfg.credenciales.fravega_seller_id, "Frávega seller-id")}
          ${cred(cfg.credenciales.fravega_api_key, "Frávega x-fvg-api-key")}
          ${cred(cfg.credenciales.fravega_api_token, "Frávega x-fvg-api-token")}
          ${cred(cfg.credenciales.google_client_id, "Google Client ID")}
          <p class="text-xs text-gray-500 mt-3">Por seguridad, las credenciales se administran en el
          editor de Apps Script: <b>Configuración del proyecto → Script Properties</b>.</p>`)}
      </div>
    </div>`);
}

async function guardarConfig() {
  const valores = {};
  document.querySelectorAll(".cfg-input").forEach((el) => {
    valores[el.dataset.key] = el.type === "checkbox" ? (el.checked ? "1" : "0") : el.value.trim();
  });
  try {
    const r = await api("settings.set", { valores });
    toast("Configuración guardada", "ok");
    if (r.proxima_sincronizacion) toast(`Próxima sincronización: ${r.proxima_sincronizacion}`, "info");
  } catch (e) { toast(e.message, "error"); }
}
